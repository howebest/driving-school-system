<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>驾校管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 布局容器 */
    .app-layout {
      display: flex;
      height: 100vh;
    }
    
    /* 左侧导航栏 */
    .sidebar {
      width: 220px;
      background: white;
      border-right: 1px solid #e4e9f0;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 8px rgba(0,0,0,0.05);
      z-index: 100;
    }
    
    .logo-area {
      padding: 24px;
      border-bottom: 1px solid #e4e9f0;
    }
    
    .logo {
      font-size: 20px;
      font-weight: 600;
      color: #1e80ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: #1e80ff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    
    .nav-menu {
      flex: 1;
      padding: 16px 0;
      overflow-y: auto;
    }
    
    .menu-group {
      margin-bottom: 8px;
    }
    
    .menu-title {
      padding: 12px 24px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    
    .menu-item:hover {
      background: #f0f7ff;
      color: #1e80ff;
    }
    
    .menu-item.active {
      background: #eaf3ff;
      color: #1e80ff;
      border-left: 3px solid #1e80ff;
      font-weight: 500;
    }
    
    .menu-item i {
      margin-right: 12px;
      font-size: 18px;
      width: 20px;
      text-align: center;
    }
    
    .user-info {
      padding: 16px 24px;
      border-top: 1px solid #e4e9f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1e80ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 500;
      font-size: 14px;
    }
    
    .user-name {
      font-size: 14px;
      color: #333;
      flex: 1;
    }
    
    .logout-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 16px;
    }
    
    /* 主内容区域 */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 顶部工具栏 */
    .top-bar {
      background: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border-bottom: 1px solid #e4e9f0;
    }
    
    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }
    
    .top-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .search-box {
      position: relative;
    }
    
    .search-input {
      padding: 8px 12px 8px 36px;
      border: 1px solid #e4e9f0;
      border-radius: 4px;
      width: 240px;
      font-size: 14px;
    }
    
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }
    
    /* 内容区域 */
    .content-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    
    /* 页面头部 */
    .page-header {
      background: white;
      padding: 24px;
      border-radius: 8px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .header-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .header-title h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    
    .header-desc {
      color: #666;
      font-size: 14px;
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
    }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.2s;
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    
    .stat-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      font-size: 24px;
      color: white;
    }
    
    .stat-icon.blue { background: #1e80ff; }
    .stat-icon.green { background: #2e7d32; }
    .stat-icon.orange { background: #f57c00; }
    .stat-icon.purple { background: #7b1fa2; }
    
    .stat-info {
      flex: 1;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }
    
    .stat-label {
      color: #666;
      font-size: 14px;
    }
    
    /* 表格容器 */
    .table-container {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .table-header {
      padding: 16px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .table-title {
      font-weight: 500;
      color: #333;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      background: #f8f9fa;
      padding: 12px 24px;
      text-align: left;
      font-weight: 500;
      color: #666;
      border-bottom: 1px solid #eee;
    }
    
    td {
      padding: 12px 24px;
      border-bottom: 1px solid #eee;
      color: #333;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    /* 按钮样式 */
    .btn {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary {
      background: #1e80ff;
      color: white;
    }
    
    .btn-primary:hover {
      background: #0066cc;
    }
    
    .btn-secondary {
      background: white;
      color: #666;
      border: 1px solid #e4e9f0;
    }
    
    .btn-secondary:hover {
      background: #f8f9fa;
      border-color: #c9d1d9;
    }
    
    .btn-text {
      background: transparent;
      color: #1e80ff;
      padding: 4px 8px;
    }
    
    .btn-text:hover {
      background: #f0f7ff;
    }
    
    /* 标签样式 */
    .tag {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .tag-success { background: #e8f5e9; color: #2e7d32; }
    .tag-warning { background: #fff3e0; color: #f57c00; }
    .tag-danger { background: #ffebee; color: #c62828; }
    .tag-info { background: #e3f2fd; color: #1565c0; }
    .tag-primary { background: #eaf3ff; color: #1e80ff; }
    
    /* 搜索过滤区域 */
    .filter-bar {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .filter-row {
      display: flex;
      gap: 16px;
      align-items: end;
      flex-wrap: wrap;
    }
    
    .filter-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .filter-label {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }
    
    .filter-input, .filter-select {
      padding: 8px 12px;
      border: 1px solid #e4e9f0;
      border-radius: 4px;
      font-size: 14px;
    }
    
    .filter-select {
      min-width: 150px;
    }
    
    /* 分页器 */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-top: 1px solid #eee;
    }
    
    .pagination-info {
      font-size: 14px;
      color: #666;
    }
    
    .pagination-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
      }
      
      .logo-area {
        padding: 16px;
      }
      
      .logo-text {
        display: none;
      }
      
      .menu-title {
        display: none;
      }
      
      .menu-item span {
        display: none;
      }
      
      .content-area {
        padding: 16px;
      }
    }
  </style>
</head>

        item.classList.remove('active');
      });
      event.currentTarget.classList.add('active');
      
      // 更新页面标题
      document.getElementById('current-page-title').textContent = menuConfig[menu].title;
      
      // 更新内容
      document.getElementById('main-content').innerHTML = menuConfig[menu].content;
