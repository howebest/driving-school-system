<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>驾校管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 布局容器 */
    .app-layout {
      display: flex;
      height: 100vh;
    }
    
    /* 左侧导航栏 */
    .sidebar {
      width: 240px;
      background: white;
      border-right: 1px solid #e9ecef;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 12px rgba(0,0,0,0.05);
    }
    
    .logo-area {
      padding: 24px;
      border-bottom: 1px solid #e9ecef;
    }
    
    .logo {
      font-size: 22px;
      font-weight: 600;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 36px;
      height: 36px;
      background: #3498db;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }
    
    .nav-menu {
      flex: 1;
      padding: 16px 0;
      overflow-y: auto;
    }
    
    .menu-group {
      margin-bottom: 12px;
    }
    
    .menu-title {
      padding: 12px 24px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #7f8c8d;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      color: #34495e;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      font-size: 14px;
    }
    
    .menu-item:hover {
      background: #f8f9fa;
      color: #3498db;
    }
    
    .menu-item.active {
      background: #e3f2fd;
      color: #3498db;
      border-left: 3px solid #3498db;
      font-weight: 500;
    }
    
    .menu-item i {
      margin-right: 12px;
      font-size: 16px;
      width: 20px;
      text-align: center;
      color: #7f8c8d;
    }
    
    .menu-item.active i {
      color: #3498db;
    }
    
    .user-info {
      padding: 16px 24px;
      border-top: 1px solid #e9ecef;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3498db;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 500;
      font-size: 16px;
    }
    
    .user-name {
      font-size: 14px;
      color: #2c3e50;
      flex: 1;
      font-weight: 500;
    }
    
    .logout-btn {
      background: none;
      border: none;
      color: #7f8c8d;
      cursor: pointer;
      font-size: 18px;
      transition: color 0.2s;
    }
    
    .logout-btn:hover {
      color: #e74c3c;
    }
    
    /* 主内容区域 */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 顶部工具栏 */
    .top-bar {
      background: white;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      border-bottom: 1px solid #e9ecef;
    }
    
    .page-title {
      font-size: 22px;
      font-weight: 600;
      color: #2c3e50;
    }
    
    .top-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .search-box {
      position: relative;
    }
    
    .search-input {
      padding: 10px 16px 10px 40px;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      width: 280px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }
    
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #7f8c8d;
      font-size: 16px;
    }
    
    /* 内容区域 - 改为左右布局 */
    .content-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: #f8f9fa;
      display: flex;
      gap: 24px;
    }
    
    /* 左侧搜索面板 */
    .left-panel {
      width: 320px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      padding: 24px;
      height: fit-content;
    }
    
    .panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e9ecef;
    }
    
    /* 右侧主内容区域 */
    .right-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    
    /* 页面头部 */
    .page-header {
      background: white;
      padding: 20px 24px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    
    .header-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .header-title h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #2c3e50;
    }
    
    .header-desc {
      color: #7f8c8d;
      font-size: 14px;
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
    }
    
    /* 统计卡片 - 纯单色设计 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    
    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 20px;
      font-size: 24px;
      color: #3498db;
      background: #e3f2fd;
      border: 1px solid #bbdefb;
    }
    
    .stat-info {
      flex: 1;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #2c3e50;
      line-height: 1.2;
    }
    
    .stat-label {
      color: #7f8c8d;
      font-size: 14px;
      font-weight: 500;
    }
    
    /* 表格容器 */
    .table-container {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    
    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .table-title {
      font-size: 18px;
      font-weight: 600;
      color: #2c3e50;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      background: #f8f9fa;
      padding: 16px 24px;
      text-align: left;
      font-weight: 600;
      color: #34495e;
      border-bottom: 1px solid #e9ecef;
      font-size: 14px;
    }
    
    td {
      padding: 16px 24px;
      border-bottom: 1px solid #e9ecef;
      color: #34495e;
      font-size: 14px;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    /* 按钮样式 - 纯单色设计 */
    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: #3498db;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2980b9;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
    }
    
    .btn-secondary {
      background: white;
      color: #34495e;
      border: 1px solid #e9ecef;
    }
    
    .btn-secondary:hover {
      background: #f8f9fa;
      border-color: #d1d1d1;
    }
    
    .btn-text {
      background: transparent;
      color: #3498db;
      padding: 6px 12px;
    }
    
    .btn-text:hover {
      background: #e3f2fd;
      color: #2980b9;
    }
    
    /* 图标字体 - 纯单色 */
    .icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      stroke-width: 0;
      stroke: currentColor;
      fill: currentColor;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      line-height: 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* 标签样式 */
    .tag {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .tag-success { 
      background: #e8f5e9; 
      color: #2e7d32; 
      border: 1px solid #c8e6c9;
    }
    
    .tag-warning { 
      background: #fff3e0; 
      color: #f57c00; 
      border: 1px solid #ffe0b2;
    }
    
    .tag-danger { 
      background: #ffebee; 
      color: #c62828; 
      border: 1px solid #ffcdd2;
    }
    
    .tag-info { 
      background: #e3f2fd; 
      color: #1565c0; 
      border: 1px solid #bbdefb;
    }
    
    .tag-primary { 
      background: #e3f2fd; 
      color: #3498db; 
      border: 1px solid #bbdefb;
    }
    
    /* 搜索过滤区域 */
    .filter-bar {
      background: white;
      padding: 24px;
      border-radius: 8px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    
    .filter-row {
      display: flex;
      gap: 20px;
      align-items: end;
      flex-wrap: wrap;
    }
    
    .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 200px;
    }
    
    .filter-label {
      font-size: 14px;
      color: #34495e;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .filter-input, .filter-select {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #e9ecef;
      border-radius: 4px;
      font-size: 14px;
      min-width: 120px;
    }
    
    .filter-input:focus, .filter-select:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }
    
    .filter-select {
      min-width: 160px;
    }
    
    /* 分页器 */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-top: 1px solid #e9ecef;
    }
    
    .pagination-info {
      font-size: 14px;
      color: #7f8c8d;
    }
    
    .pagination-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
      .sidebar {
        width: 70px;
      }
      
      .logo-area {
        padding: 16px;
      }
      
      .logo-text {
        display: none;
      }
      
      .menu-title {
        display: none;
      }
      
      .menu-item span {
        display: none;
      }
      
      .content-area {
        padding: 16px;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .filter-row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
