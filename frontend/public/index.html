<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>驾校管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
    }
    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 20px;
      font-weight: 600;
      color: #1e80ff;
    }
    .nav {
      display: flex;
      margin-left: 40px;
      gap: 24px;
    }
    .nav-item {
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
    }
    .nav-item:hover, .nav-item.active {
      background: #eaf3ff;
      color: #1e80ff;
    }
    .main-content {
      flex: 1;
      padding: 24px;
    }
    .page-header {
      background: white;
      padding: 24px;
      border-radius: 8px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .page-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    .page-desc {
      color: #666;
      font-size: 14px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      background: #1e80ff;
      color: white;
      font-size: 24px;
    }
    .card-value {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }
    .card-label {
      color: #666;
      font-size: 14px;
    }
    .table-container {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .table-header {
      padding: 16px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-title {
      font-weight: 500;
      color: #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f8f9fa;
      padding: 12px 24px;
      text-align: left;
      font-weight: 500;
      color: #666;
      border-bottom: 1px solid #eee;
    }
    td {
      padding: 12px 24px;
      border-bottom: 1px solid #eee;
      color: #333;
    }
    tr:hover {
      background: #f8f9fa;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #1e80ff;
      color: white;
    }
    .btn-primary:hover {
      background: #0066cc;
    }
    .btn-text {
      background: transparent;
      color: #1e80ff;
    }
    .btn-text:hover {
      background: #f0f7ff;
    }
    .tag {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .tag-success { background: #e8f5e9; color: #2e7d32; }
    .tag-warning { background: #fff3e0; color: #f57c00; }
    .tag-danger { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>
  <div class="app-container" id="app">
    <div class="header">
      <div class="logo">驾校管理系统</div>
      <div class="nav">
        <div class="nav-item active" onclick="switchPage('dashboard')">首页</div>
        <div class="nav-item" onclick="switchPage('student')">学员管理</div>
        <div class="nav-item" onclick="switchPage('coach')">教练管理</div>
        <div class="nav-item" onclick="switchPage('car')">车辆管理</div>
        <div class="nav-item" onclick="switchPage('site')">场地管理</div>
      </div>
    </div>
    
    <div class="main-content">
      <div id="page-content">
        <!-- 页面内容将在这里动态渲染 -->
      </div>
    </div>
  </div>

            </div>

          </div>
        `
      },
      student: {

        content: `

            </table>
          </div>
        `
      },
      coach: {

        desc: '管理系统中的所有教练信息',
        content: `
          <div class="table-container">

              <div class="table-title">教练列表 [共 2 条记录]</div>

            </div>
            <table>
              <thead>
                <tr>
                  <th>ID</th>

              </thead>
              <tbody>

        `
      },
      car: {
        title: '车辆管理',
        desc: '管理驾校所有训练车辆信息',
        content: `
          <div class="table-container">

            </div>
            <table>

                <tr>

                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>粤A12345</td>

                  <td>
                    <button class="btn btn-text">查看</button>

        `
      },
      site: {
        title: '场地管理',
        desc: '管理驾校各个训练场地信息',
        content: `
          <div class="table-container">
            <div class="table-header">
              <div class="table-title">场地列表 [共 1 条记录]</div>

              </tbody>
            </table>
          </div>
        `
      }
    };

    // 切换页面函数
    function switchPage(page) {
      currentPage = page;
      
      // 更新导航激活状态
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // 更新页面内容
      const pageContent = document.getElementById('page-content');
      const data = pageData[page];
      
      pageContent.innerHTML = `
        <div class="page-header">
          <div class="page-title">${data.title}</div>
          <div class="page-desc">${data.desc}</div>
        </div>
        ${data.content}
      `;
    }

    // 添加学员函数
    function addStudent() {
      alert('新增学员功能 - 后续可连接真实API');
    }

    // 初始化页面
    document.addEventListener('DOMContentLoaded', function() {
      switchPage('dashboard');
    });

    console.log('驾校管理系统已加载');
  </script>
</body>
</html>
