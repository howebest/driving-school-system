<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>驾校管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 布局容器 */
    .app-layout {
      display: flex;
      height: 100vh;
    }
    
    /* 左侧导航栏 */
    .sidebar {
      width: 220px;
      background: white;
      border-right: 1px solid #e4e9f0;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 8px rgba(0,0,0,0.05);
      z-index: 100;
    }
    
    .logo-area {
      padding: 24px;
      border-bottom: 1px solid #e4e9f0;
    }
    
    .logo {
      font-size: 20px;
      font-weight: 600;
      color: #1e80ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: #1e80ff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    
    .nav-menu {
      flex: 1;
      padding: 16px 0;
      overflow-y: auto;
    }
    
    .menu-group {
      margin-bottom: 8px;
    }
    
    .menu-title {
      padding: 12px 24px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    
    .menu-item:hover {
      background: #f0f7ff;
      color: #1e80ff;
    }
    
    .menu-item.active {
      background: #eaf3ff;
      color: #1e80ff;
      border-left: 3px solid #1e80ff;
      font-weight: 500;
    }
    
    .menu-item i {
      margin-right: 12px;
      font-size: 18px;
      width: 20px;
      text-align: center;
    }
    
    .user-info {
      padding: 16px 24px;
      border-top: 1px solid #e4e9f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1e80ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 500;
      font-size: 14px;
    }
    
    .user-name {
      font-size: 14px;
      color: #333;
      flex: 1;
    }
    
    .logout-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 16px;
    }
    
    /* 主内容区域 */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 顶部工具栏 */
    .top-bar {
      background: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border-bottom: 1px solid #e4e9f0;
    }
    
    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }
    
    .top-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .search-box {
      position: relative;
    }
    
    .search-input {
      padding: 8px 12px 8px 36px;
      border: 1px solid #e4e9f0;
      border-radius: 4px;
      width: 240px;
      font-size: 14px;
    }
    
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }
    
    /* 内容区域 */
    .content-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    
    /* 页面头部 */
    .page-header {
      background: white;
      padding: 24px;
      border-radius: 8px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .header-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .header-title h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    
    .header-desc {
      color: #666;
      font-size: 14px;
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
    }
    
    /* 统计卡片 - 左右布局 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.2s;
      display: flex;
      align-items: center;
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    
    /* 其他页面保持原有样式 */
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      font-size: 24px;
      color: #666;
      background: #f8f9fa;
    }
    
    .stat-info {
      flex: 1;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }
    
    .stat-label {
      color: #666;
      font-size: 14px;
    }
    
    /* 表格容器 */
    .table-container {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .table-header {
      padding: 16px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .table-title {
      font-weight: 500;
      color: #333;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      background: #f8f9fa;
      padding: 12px 24px;
      text-align: left;
      font-weight: 500;
      color: #666;
      border-bottom: 1px solid #eee;
    }
    
    td {
      padding: 12px 24px;
      border-bottom: 1px solid #eee;
      color: #333;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    /* 按钮样式 - 单色图标 */
    .btn {
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary {
      background: #1e80ff;
      color: white;
    }
    
    .btn-primary:hover {
      background: #0066cc;
    }
    
    .btn-secondary {
      background: white;
      color: #666;
      border: 1px solid #e4e9f0;
    }
    
    .btn-secondary:hover {
      background: #f8f9fa;
      border-color: #c9d1d9;
    }
    
    .btn-text {
      background: transparent;
      color: #1e80ff;
      padding: 4px 8px;
    }
    
    .btn-text:hover {
      background: #f0f7ff;
    }
    
    /* 标签样式 */
    .tag {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .tag-success { background: #e8f5e9; color: #2e7d32; }
    .tag-warning { background: #fff3e0; color: #f57c00; }
    .tag-danger { background: #ffebee; color: #c62828; }
    .tag-info { background: #e3f2fd; color: #1565c0; }
    .tag-primary { background: #eaf3ff; color: #1e80ff; }
    
    /* 搜索过滤区域 */
    .filter-bar {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .filter-row {
      display: flex;
      gap: 16px;
      align-items: end;
      flex-wrap: wrap;
    }
    
    .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .filter-label {
      font-size: 14px;
      color: #333;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .filter-input, .filter-select {
      padding: 8px 12px;
      border: 1px solid #e4e9f0;
      border-radius: 4px;
      font-size: 14px;
    }
    
    .filter-select {
      min-width: 150px;
    }
    
    /* 分页器 */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-top: 1px solid #eee;
    }
    
    .pagination-info {
      font-size: 14px;
      color: #666;
    }
    
    .pagination-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    /* 新增学员模态框样式 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    
    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-content {
      background: white;
      border-radius: 8px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h2 {
      margin: 0;
      color: #2c3e50;
      font-size: 20px;
    }
    
    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    
    .close-btn:hover {
      color: #666;
    }
    
    .modal-body {
      padding: 24px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    
    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: #34495e;
    }
    
    .form-input, .form-select, .form-textarea {
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }
    
    .avatar-upload {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 20px;
      border: 2px dashed #ddd;
      border-radius: 8px;
      background: #fafafa;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .avatar-upload:hover {
      border-color: #3498db;
      background: #f0f8ff;
    }
    
    .avatar-preview {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #eee;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .avatar-placeholder {
      font-size: 48px;
      color: #ccc;
    }
    
    .upload-text {
      text-align: center;
      color: #666;
      font-size: 14px;
    }
    
    .upload-text strong {
      color: #3498db;
      display: block;
      margin-top: 5px;
    }
    
    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    
    .hidden {
      display: none;
    }
    
    /* 颜色分类卡片样式 */
    .card-red {
      border-left: 4px solid #e74c3c;
    }
    
    .card-orange {
      border-left: 4px solid #f39c12;
    }
    
    .card-green {
      border-left: 4px solid #2ecc71;
    }
    
    .card-blue {
      border-left: 4px solid #3498db;
    }
    
    /* 图表容器 */
    .charts-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .chart-panel {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      padding: 20px;
    }
    
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .chart-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: #2c3e50;
      margin: 0;
    }
    
    .view-link {
      color: #3498db;
      text-decoration: none;
      font-size: 14px;
    }
    
    .view-link:hover {
      text-decoration: underline;
    }
    
    /* 图表占位符 */
    .chart-placeholder {
      height: 200px;
      display: flex;
      align-items: flex-end;
      position: relative;
    }
    
    .chart-grid {
      display: flex;
      width: 100%;
      height: 100%;
    }
    
    .y-axis {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-right: 10px;
      font-size: 12px;
      color: #7f8c8d;
    }
    
    .chart-area {
      flex: 1;
      position: relative;
      border-bottom: 1px solid #ecf0f1;
      border-left: 1px solid #ecf0f1;
    }
    
    .trend-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 150px;
      background: linear-gradient(transparent 0%, #3498db 100%);
      clip-path: polygon(0% 100%, 14% 70%, 28% 85%, 42% 40%, 56% 20%, 70% 60%, 84% 30%, 100% 65%, 100% 100%);
    }
    
    .x-axis {
      display: flex;
      justify-content: space-around;
      padding-top: 10px;
      font-size: 12px;
      color: #7f8c8d;
    }
    
    /* 饼图占位符 */
    .pie-chart-placeholder {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      position: relative;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid #ecf0f1;
    }
    
    .pie-segment {
      position: absolute;
      width: 50%;
      height: 50%;
      transform-origin: 100% 100%;
    }
    
    .segment-blue { background-color: #3498db; }
    .segment-green { background-color: #2ecc71; }
    .segment-gray { background-color: #95a5a6; }
    .segment-orange { background-color: #f39c12; }
    .segment-dark { background-color: #34495e; }
    
    /* 图例 */
    .chart-legend {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
    
    /* 预警表格 */
    .alert-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    
    .alert-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .alert-table th {
      background: #f8f9fa;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #34495e;
      border-bottom: 1px solid #ecf0f1;
    }
    
    .alert-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #ecf0f1;
      color: #2c3e50;
    }
    
    .alert-table tr:hover {
      background: #f8f9fa;
    }
    
    /* 状态标签 */
    .status-tag {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-unhandled {
      background: #fadbd8;
      color: #e74c3c;
    }
    
    .status-handled {
      background: #d5f5e3;
      color: #27ae60;
    }
    
    .status-notified {
      background: #fef9e7;
      color: #f39c12;
    }
    
    /* 响应式调整 */
    @media (max-width: 1200px) {
      .charts-container {
        grid-template-columns: 1fr;
      }
    }
    
    /* 响应式设计 */
    /* 模态框样式 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      animation: fadeIn 0.3s ease;
    }

    .modal-content {
      background-color: white;
      margin: 2% auto;
      padding: 0;
      border-radius: 10px;
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
    }

    .modal-header {
      padding: 1.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 10px 10px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 1.5rem;
    }

    .close {
      color: white;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close:hover {
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-footer {
      padding: 1.5rem;
      background: #f8f9fa;
      border-radius: 0 0 10px 10px;
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      border-top: 1px solid #eee;
    }

    /* 表单样式 - 紧凑版 */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group.compact {
      margin-bottom: 0.6rem;
    }

    .form-group label {
      margin-bottom: 0.3rem;
      font-weight: 500;
      color: #333;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.9rem;
      transition: border-color 0.3s ease;
      min-height: 32px;
    }

    .form-group textarea {
      min-height: 60px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* 头像上传样式 */
    .avatar-upload {
      position: relative;
      display: inline-block;
      cursor: pointer;
    }

    .avatar-upload input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    #avatarPreview {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #667eea;
      display: block;
    }

    .upload-placeholder {
      width: 120px;
      height: 120px;
      border: 2px dashed #ccc;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #f8f9fa;
      transition: all 0.3s ease;
    }

    .upload-placeholder:hover {
      border-color: #667eea;
      background: #eef1ff;
    }

    .upload-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #667eea;
    }

    .upload-hint {
      font-size: 0.8rem;
      color: #666;
      margin: 0;
    }

    /* 动画效果 */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideIn {
      from { 
        transform: translateY(-50px);
        opacity: 0;
      }
      to { 
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
      }
      
      .logo-area {
        padding: 16px;
      }

  <script>
    // 头像预览功能
    function previewAvatar(event) {
      const file = event.target.files[0];
      const preview = document.getElementById('avatarPreview');
      const placeholder = document.getElementById('uploadPlaceholder');
      
      if (file) {
        // 验证文件类型
        if (!file.type.startsWith('image/')) {
          alert('请选择图片文件！');
          event.target.value = '';
          return;
        }
        
        // 验证文件大小（2MB）
        if (file.size > 2 * 1024 * 1024) {
          alert('图片大小不能超过2MB！');
          event.target.value = '';
          return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result;
          preview.style.display = 'block';
          placeholder.style.display = 'none';
        };
        reader.readAsDataURL(file);
      } else {
        preview.style.display = 'none';
        placeholder.style.display = 'block';
      }
    }
    
    // 打开模态框
    function openAddStudentModal() {
      document.getElementById('addStudentModal').style.display = 'block';
      // 设置默认报名日期为今天
      document.getElementById('enrollmentDate').valueAsDate = new Date();
    }
    
    // 关闭模态框
    function closeModal() {
      document.getElementById('addStudentModal').style.display = 'none';
      document.getElementById('studentForm').reset();
      // 重置头像预览
      document.getElementById('avatarPreview').style.display = 'none';
      document.getElementById('uploadPlaceholder').style.display = 'block';
    }
    
    // 保存学员信息
    function saveStudent() {
      const form = document.getElementById('studentForm');
      
      // 表单验证
      if (!form.checkValidity()) {
        // 触发表单验证
        const submitBtn = document.createElement('button');
        submitBtn.type = 'submit';
        form.appendChild(submitBtn);
        submitBtn.click();
        form.removeChild(submitBtn);
        return;
      }
      
      // 收集表单数据
      const formData = new FormData(form);
      const studentData = {
        name: formData.get('name'),
        phone: formData.get('phone'),
        idCard: formData.get('idCard'),
        gender: formData.get('gender'),
        birthDate: formData.get('birthDate'),
        address: formData.get('address'),
        emergencyContact: formData.get('emergencyContact'),
        emergencyPhone: formData.get('emergencyPhone'),
        licenseType: formData.get('licenseType'),
        enrollmentDate: formData.get('enrollmentDate'),
        tuitionFee: parseFloat(formData.get('tuitionFee')),
        paymentStatus: formData.get('paymentStatus'),
        notes: formData.get('notes') || '',
        avatar: formData.get('avatar') ? URL.createObjectURL(formData.get('avatar')) : null,
        studentId: 'STU' + Date.now(), // 生成学员编号
        status: 'active',
        createTime: new Date().toISOString()
      };
      
      // 这里可以发送到后端API
      console.log('保存学员信息:', studentData);
      
      // 模拟保存成功
      alert('学员信息保存成功！');
      closeModal();
      
      // 实际项目中这里应该：
      // 1. 发送POST请求到后端API
      // 2. 处理响应结果
      // 3. 更新学员列表
      // 4. 显示成功/失败消息
    }
    
    // 修改原有的addStudent函数
    function addStudent() {
      openAddStudentModal();
    }
  </script>
