server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: driving-school-system
    
  profiles:
    active: dev
  config:
    import: classpath:application-thirdparty.yml
    
  datasource:
    url: jdbc:mysql://localhost:3306/driving_school?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
        
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    
logging:
  level:
    com.drivingschool: debug
    org.springframework.security: info
    
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.drivingschool.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    
# JWT配置
jwt:
  secret: drivingSchoolSecretKey2023
  expiration: 86400000
  
# 文件上传配置
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 100MB