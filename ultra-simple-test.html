<!DOCTYPE html>
<html>
<head>
    <title>超简化功能测试</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h1>🔬 超简化功能测试</h1>
    
    <div style="background: #f0f0f0; padding: 20px; margin: 20px 0; border-radius: 8px;">
        <h3>简化表单测试</h3>
        <form id="simpleForm">
            <div style="margin: 10px 0;">
                <label>姓名: </label>
                <input type="text" id="simpleName" required>
            </div>
            <div style="margin: 10px 0;">
                <label>手机号: </label>
                <input type="tel" id="simplePhone" required>
            </div>
            <div style="text-align: right; margin-top: 20px;">
                <button 
                    type="button" 
                    id="simpleCancel"
                    style="padding: 8px 16px; margin-left: 10px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    取消
                </button>
                <button 
                    type="button" 
                    id="simpleSave"
                    style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    确定
                </button>
            </div>
        </form>
    </div>
    
    <div id="log" style="background: black; color: white; padding: 15px; font-family: monospace; height: 150px; overflow-y: scroll;">
        > 等待操作...
    </div>
    
    <div id="result" style="margin-top: 20px;"></div>

    <script>
        let counter = 0;
        const log = document.getElementById('log');
        
        function addLog(msg) {
            counter++;
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `[${time}] ${counter}. ${msg}\n`;
            log.scrollTop = log.scrollHeight;
            console.log(msg);
        }
        
        function setResult(type, msg) {
            const result = document.getElementById('result');
            result.innerHTML = `
                <div style="padding: 15px; background: ${type === 'success' ? '#d4edda' : '#f8d7da'}; 
                           color: ${type === 'success' ? '#155724' : '#721c24'}; border-radius: 6px;">
                    <h3>${type === 'success' ? '✅' : '❌'} ${msg}</h3>
                </div>
            `;
        }
        
        // 最基础的事件绑定
        document.getElementById('simpleCancel').onclick = function(e) {
            e.preventDefault();
            addLog('取消按钮被点击');
            setResult('info', '取消功能正常工作！');
        };
        
        document.getElementById('simpleSave').onclick = function(e) {
            e.preventDefault();
            addLog('保存按钮被点击');
            
            const name = document.getElementById('simpleName').value;
            const phone = document.getElementById('simplePhone').value;
            
            if (!name || !phone) {
                setResult('error', '请填写所有必填字段！');
                return;
            }
            
            const data = { name, phone };
            addLog('保存数据: ' + JSON.stringify(data));
            setResult('success', '保存功能正常工作！');
            
            // 重置表单
            document.getElementById('simpleForm').reset();
        };
        
        addLog('简化测试页面初始化完成');
    </script>
</body>
</html>
